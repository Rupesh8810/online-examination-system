<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><script src="https://cdn.tailwindcss.com"></script></head>
<body class="min-h-screen bg-gradient-to-br from-blue-900 to-indigo-900 flex items-center justify-center px-4">
<div class="w-full max-w-md">
  <div class="text-center mb-8">
    <div class="w-16 h-16 bg-white/10 rounded-full flex items-center justify-center text-3xl mx-auto mb-3">👩‍🎓</div>
    <h1 class="text-white text-2xl font-bold">Student Login</h1>
    <p class="text-blue-200 text-sm">BBDNIIT Examination Portal</p>
  </div>
  <div class="bg-white rounded-2xl shadow-2xl p-8">
    <form method="post">{% csrf_token %}
      <div class="mb-4"><label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
        <input name="username" type="text" required class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-blue-500 outline-none"/></div>
      <div class="mb-6"><label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
        <input name="password" type="password" required class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-blue-500 outline-none"/></div>
      {% if form.errors %}<p class="text-red-600 text-sm mb-4">Invalid credentials.</p>{% endif %}
      <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-2.5 rounded-xl transition">Login</button>
    </form>
    <p class="text-center mt-4 text-sm">No account? <a href="{% url 'studentsignup' %}" class="text-blue-600 hover:underline">Register</a></p>
  </div>
</div></body></html>
