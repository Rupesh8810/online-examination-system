<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin Login – BBDNIIT</title>
<script src="https://cdn.tailwindcss.com"></script></head>
<body class="min-h-screen bg-gradient-to-br from-blue-900 to-indigo-900 flex items-center justify-center px-4">
<div class="w-full max-w-md">
  <div class="text-center mb-8">
    <div class="w-20 h-20 bg-white/10 rounded-full flex items-center justify-center text-4xl mx-auto mb-3">🏛️</div>
    <h1 class="text-white text-2xl font-bold">BBDNIIT</h1>
    <p class="text-blue-200 text-sm">Admin Login</p>
  </div>
  <div class="bg-white rounded-2xl shadow-2xl p-8">
    <form method="post">{% csrf_token %}
      <div class="mb-4">
        <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
        <input name="username" type="text" required class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none"/>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
        <input name="password" type="password" required class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none"/>
      </div>
      {% if form.errors %}<p class="text-red-600 text-sm mb-4">Invalid credentials. Try again.</p>{% endif %}
      <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-2.5 rounded-xl transition">Login</button>
    </form>
    <p class="text-center mt-4 text-sm text-gray-500"><a href="/" class="text-blue-600 hover:underline">← Back to Home</a></p>
  </div>
</div>
</body></html>
