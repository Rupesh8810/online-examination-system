<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<script src="https://cdn.tailwindcss.com"></script></head>
<body class="min-h-screen bg-gradient-to-br from-emerald-800 to-teal-900 flex items-center justify-center px-4 py-8">
<div class="w-full max-w-lg bg-white rounded-2xl shadow-2xl p-8">
  <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Teacher Registration</h1>
  <form method="post" enctype="multipart/form-data">{% csrf_token %}
    {% for field in userForm %}<div class="mb-4"><label class="block text-sm font-semibold text-gray-700 mb-1">{{ field.label }}</label>
      {{ field }}{% if field.errors %}<p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}</div>{% endfor %}
    {% for field in teacherForm %}<div class="mb-4"><label class="block text-sm font-semibold text-gray-700 mb-1">{{ field.label }}</label>
      {{ field }}{% if field.errors %}<p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}</div>{% endfor %}
    <button type="submit" class="w-full bg-emerald-700 text-white font-bold py-2.5 rounded-xl hover:bg-emerald-800 transition">Register</button>
  </form>
  <p class="text-center mt-4 text-sm text-gray-500"><a href="{% url 'teacherlogin' %}" class="text-emerald-600 hover:underline">Already have an account?</a></p>
</div>
</body></html>
