version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-bbdniit_exam}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:    {condition: service_healthy}
      redis: {condition: service_healthy}
    environment:
      DJANGO_ENV: production
      SECRET_KEY: ${SECRET_KEY:-changeme}
      DB_NAME: ${DB_NAME:-bbdniit_exam}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate --settings=onlinexam.settings.production &&
             python manage.py collectstatic --noinput --settings=onlinexam.settings.production &&
             gunicorn onlinexam.wsgi:application
             --config gunicorn.conf.py"

volumes:
  pgdata:
